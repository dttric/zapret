name: "Баг-репорт"
description: "Сообщить об ошибке в работе Zapret GUI"
title: "[Баг]: "
labels: ["bug"]
type: "bug"
body:
  - type: markdown
    attributes:
      value: |
        Спасибо, что сообщаете об ошибке! Пожалуйста, заполните форму ниже как можно подробнее — это поможет нам быстрее найти и исправить проблему.

        Перед созданием issue убедитесь, что аналогичный баг ещё не был зарегистрирован.

  - type: input
    id: version
    attributes:
      label: Версия Zapret GUI
      description: "Указана в заголовке окна или в разделе «О программе»"
      placeholder: "Например: 1.2.3"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Операционная система
      options:
        - Windows 10
        - Windows 11
        - Windows 7
        - "Windows 8/8.1"
        - Другая
    validations:
      required: true

  - type: input
    id: provider
    attributes:
      label: Провайдер
      description: "Ваш интернет-провайдер (если считаете, что это может быть связано с проблемой)"
      placeholder: "Например: Ростелеком, МТС, Билайн"
    validations:
      required: false

  - type: input
    id: preset
    attributes:
      label: Используемый пресет
      description: "Какой пресет (стратегию) вы используете"
      placeholder: "Например: Default, general ALT 3, Ростелеком"
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: Описание бага
      description: "Кратко опишите суть проблемы"
      placeholder: "Что происходит не так?"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Шаги воспроизведения
      description: "Перечислите шаги, которые приводят к ошибке"
      placeholder: |
        1. Открыть программу
        2. Выбрать пресет ...
        3. Нажать кнопку ...
        4. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Ожидаемое поведение
      description: "Что должно было произойти"
      placeholder: "Программа должна была ..."
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Фактическое поведение
      description: "Что произошло на самом деле"
      placeholder: "Вместо этого произошло ..."
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Логи / скриншоты
      description: |
        Если есть — приложите логи программы или скриншоты.
        Вы можете перетащить файлы прямо в это поле или вставить из буфера обмена.
      placeholder: "Перетащите файлы сюда или вставьте текст логов"
    validations:
      required: false

  - type: checkboxes
    id: existing_issues
    attributes:
      label: Проверка дубликатов
      options:
        - label: Я проверил существующие issue и не нашёл аналогичного бага
          required: true
