name: Release

on:
  push:
    branches: [main]
    tags:
      - "test*"
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    permissions:
      contents: write
    env:
      PYTHONUTF8: "1"
      PYTHONIOENCODING: "utf-8"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: x64
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller PyQt6 PyQt6-Qt6 PyQt6-sip pywin32 psutil requests urllib3 PySocks cryptography qtawesome pytz PyQt6-Fluent-Widgets wmi websockets httpx aiohttp packaging

      - name: Generate build files
        shell: python
        run: |
          import os, pathlib
          cfg = pathlib.Path("src/config")
          cfg.mkdir(parents=True, exist_ok=True)
          # build_info.py
          (cfg / "build_info.py").write_text(
              "CHANNEL='stable'\nAPP_VERSION='premium'\n",
              encoding="utf-8-sig")
          # _build_secrets.py
          (cfg / "_build_secrets.py").write_text(
              "TG_UPDATE_BOT_TOKEN=''\n"
              "GITHUB_UPDATE_TOKEN=''\n"
              "TG_LOG_BOT_TOKEN_PROD=''\n"
              "TG_LOG_BOT_TOKEN_DEV=''\n"
              "TG_LOG_CHAT_ID=0\n"
              "UPDATE_SERVERS=[]\n"
              "PREMIUM_API_BASE_URL=''\n",
              encoding="utf-8-sig")

      - name: Build EXE
        run: |
          cd src
          python -m PyInstaller --noconfirm --name Zapret --uac-admin --onedir --windowed --paths . main.py
          dir dist\Zapret\Zapret.exe

      - name: Prepare release artifact
        shell: cmd
        run: |
          cd src\dist\Zapret
          7z a ../../../Zapret.zip *

      - name: Create or Update Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: Zapret.zip # Ищем файл в корне
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}